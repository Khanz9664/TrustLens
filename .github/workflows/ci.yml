name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sundays

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TQDM_DISABLE: "1"
  FORCE_COLOR: "1"

jobs:
  setup-matrix:
    name: Setup Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo 'matrix={"os": ["ubuntu-latest"], "python-version": ["3.10", "3.12"]}' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo 'matrix={"os": ["ubuntu-latest"], "python-version": ["3.9", "3.10", "3.11", "3.12", "3.13"]}' >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo 'matrix={"os": ["ubuntu-latest", "windows-latest", "macos-latest"], "python-version": ["3.10", "3.12"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"os": ["ubuntu-latest"], "python-version": ["3.10", "3.12"]}' >> $GITHUB_OUTPUT
          fi

  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint dependencies
        run: |
          pip install pre-commit ruff
      - name: Run pre-commit
        run: pre-commit run --all-files
      - name: Ruff check
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .

  typecheck:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run mypy
        run: mypy trustlens/ --follow-imports=skip

  tests:
    name: Test ${{ matrix.os }} / ${{ matrix.python-version }}
    needs: setup-matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -e ".[dev,full]"
      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=trustlens --cov-report=xml --junitxml=junit.xml -v
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: runner.os == 'Linux'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            coverage.xml
            junit.xml

  dependency-compat:
    name: Dependency Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - name: Install minimum dependencies
        run: |
          pip install .
          pip install numpy==1.23 scikit-learn==1.2 matplotlib==3.6 scipy==1.9
      - name: Smoke test
        run: |
          python -c "import trustlens; from trustlens import quick_analyze; quick_analyze(dataset='iris')"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit

  build:
    name: Build Validation
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build dependencies
        run: pip install build twine
      - name: Build distribution
        run: python -m build
      - name: Check distribution
        run: twine check dist/*
      - name: Install wheel
        run: pip install dist/*.whl
      - name: Smoke test
        run: |
          python -c "import trustlens; from trustlens import analyze, quick_analyze; quick_analyze(dataset='iris')"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
